          gap: 0.75rem;

        border-radius: 20px;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        transform-style: preserve-3d;

        .glass-card { border-radius: 24px; }
        .glass-card:hover {
          border-color: rgba(0, 51, 255, 0.4);
          background: rgba(0, 51, 255, 0.05);

        }
      }
