  <body>

    <!-- ===== CHAT WIDGET VIASOCKET (DESIGN AMÉLIORÉ) ===== -->
    <div id="viasocket-widget-container" style="position: fixed; bottom: 24px; right: 24px; z-index: 9999; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: flex-end; gap: 16px;">
      
      <!-- Fenêtre de chat -->
      <div id="chat-container" style="display: none; width: 350px; height: 500px; max-height: 80vh; background: #050A1F; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden;">
        
        <!-- Header -->
        <div style="background: #0033FF; color: #fff; padding: 16px 20px; font-weight: 600; display: flex; justify-content: space-between; align-items: center;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 10px; height: 10px; background: #4ADE80; border-radius: 50%; box-shadow: 0 0 5px #4ADE80;"></div>
            <span>Support iVISION</span>
          </div>
          <button id="chat-close" style="background: none; border: none; color: white; cursor: pointer; font-size: 24px; line-height: 1;">&times;</button>
        </div>

        <!-- Messages -->
        <div id="chat-messages" style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #0A0F2C;">
          <!-- Message de bienvenue automatique -->
          <div style="align-self: flex-start; background: rgba(255,255,255,0.08); color: #fff; padding: 12px 16px; border-radius: 12px 12px 12px 2px; font-size: 14px; max-width: 85%; line-height: 1.4;">
            Bonjour 👋 Comment peut-on vous aider aujourd'hui ?
          </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 16px; background: #050A1F; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 8px;">
          <input type="text" id="chat-input" placeholder="Écrivez votre message..." style="flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; outline: none; color: #fff; font-size: 14px; transition: border 0.3s;">
          <button id="chat-send" style="padding: 0 16px; background: #0033FF; color: #fff; border: none; border-radius: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>

      <!-- Bouton Toggle -->
      <button id="chat-toggle" style="width: 60px; height: 60px; border-radius: 50%; background: #0033FF; color: #fff; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0, 51, 255, 0.4); transition: transform 0.2s;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      </button>
    </div>

    <script>
      const VIASOCKET_WEBHOOK_URL = "https://flow.sokt.io/func/scri9wX0haz3";

      const toggleBtn = document.getElementById('chat-toggle');
      const closeBtn = document.getElementById('chat-close');
      const chatContainer = document.getElementById('chat-container');
      const chatMessages = document.getElementById('chat-messages');
      const chatInput = document.getElementById('chat-input');
      const chatSend = document.getElementById('chat-send');

      // Gérer l'ouverture/fermeture
      const toggleChat = () => {
        chatContainer.style.display = chatContainer.style.display === 'none' ? 'flex' : 'none';
        if (chatContainer.style.display === 'flex') chatInput.focus();
      };
      
      toggleBtn.addEventListener('click', toggleChat);
      closeBtn.addEventListener('click', () => chatContainer.style.display = 'none');

      // Ajouter visuellement un message
      function appendMessage(text, isUser) {
        const bubbleStyle = isUser 
          ? "align-self: flex-end; background: #0033FF; color: #fff; padding: 12px 16px; border-radius: 12px 12px 2px 12px; font-size: 14px; max-width: 85%; line-height: 1.4;"
          : "align-self: flex-start; background: rgba(255,255,255,0.08); color: #fff; padding: 12px 16px; border-radius: 12px 12px 12px 2px; font-size: 14px; max-width: 85%; line-height: 1.4;";
        
        chatMessages.innerHTML += `<div style="${bubbleStyle}">${text}</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      // Envoi du message
      async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        appendMessage(text, true); // Affiche le message de l'utilisateur
        chatInput.value = '';

        // Ajout d'un indicateur de chargement visuel
        const loadingId = "loading-" + Date.now();
        chatMessages.innerHTML += `<div id="${loadingId}" style="align-self: flex-start; color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 4px;">iVISION écrit...</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          const response = await fetch(VIASOCKET_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }) 
          });
          
          const data = await response.json();
          document.getElementById(loadingId).remove(); // Retire le statut "écrit..."
          appendMessage(data.reply || "Message bien reçu.", false);
        } catch (error) {
          document.getElementById(loadingId).remove();
          appendMessage("Erreur de connexion. Veuillez réessayer.", false);
        }
      }

      chatSend.addEventListener('click', sendMessage);
      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
      
      // Style focus input
      chatInput.addEventListener('focus', () => chatInput.style.borderColor = '#0033FF');
      chatInput.addEventListener('blur', () => chatInput.style.borderColor = 'rgba(255,255,255,0.1)');
    </script>
