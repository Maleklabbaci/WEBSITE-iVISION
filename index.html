    <!-- ===== STYLES ===== -->
    <style>
      :root { color-scheme: dark light; }
      
      html.dark body {
        background-color: #050A1F;
        color: #FFFFFF;
      }
      
      html:not(.dark) body {
        background-color: #FFFFFF;
        color: #050A1F;
      }

      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        padding-bottom: env(safe-area-inset-bottom);
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      
      .perspective-stage { perspective: 2000px; }
      .layer-3d { transform-style: preserve-3d; }

      .sketch-badge {
        border: 2px solid #0033FF;
        padding: 4px 12px;
        transform: rotate(-2deg);
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #0033FF;
        background: rgba(0, 51, 255, 0.05);
      }

      .btn-ivision {
        background-color: #0033FF;
        color: #FFFFFF;
        font-weight: 800;
        padding: 0.75rem 1.75rem;
        border-radius: 12px;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.7rem;
        transform-style: preserve-3d;
      }

      @media (min-width: 768px) {
        .btn-ivision {
          padding: 0.8rem 2rem;
          font-size: 0.75rem;
          gap: 0.75rem;
        }
      }
      
      .btn-ivision:hover {
        transform: translateY(-4px) translateZ(10px);
        box-shadow: 0 20px 40px rgba(0, 51, 255, 0.3);
      }

      html:not(.dark) .logo-img {
        filter: invert(1) brightness(0.1) contrast(2);
      }

      .glass-card {
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        transform-style: preserve-3d;
      }

      html.dark .glass-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      html:not(.dark) .glass-card {
        background: rgba(0, 51, 255, 0.02);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 51, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      @media (min-width: 768px) {
        .glass-card { border-radius: 24px; }
        .glass-card:hover {
          transform: translateY(-8px) rotateX(2deg) rotateY(2deg);
        }
        html.dark .glass-card:hover {
            border-color: rgba(0, 51, 255, 0.4);
            background: rgba(0, 51, 255, 0.05);
        }
        html:not(.dark) .glass-card:hover {
            border-color: rgba(0, 51, 255, 0.3);
            background: rgba(0, 51, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 51, 255, 0.1);
        }
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #0033FF; border-radius: 10px; }
   /* ===== LOGOS BLANCS ===== */
      .logo-white {
        filter: brightness(0) invert(1);
        -webkit-filter: brightness(0) invert(1);
      }

      html:not(.dark) .logo-white {
        filter: brightness(0);
        -webkit-filter: brightness(0);
      }

      /* ===== BANDE QUI DÉFILE ===== */
      @keyframes logoScroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .logo-scroll-band {
        animation: logoScroll 20s linear infinite;
        width: max-content;
      }

      .logo-scroll-band:hover {
        animation-play-state: paused;
      }

      /* ===== FADE IN MODAL ===== */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-fade-in {
        animation: fadeIn 0.3s ease-out;
      }
    </style>
